<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="Agent Atlas">
  <defs>
    <linearGradient id="aa-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="aa-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Grid connection lines -->
  <g stroke="url(#aa-grad)" stroke-width="1" opacity="0.35" stroke-linecap="round">
    <!-- Horizontal rows -->
    <line x1="10" y1="10" x2="38" y2="10"/>
    <line x1="10" y1="24" x2="38" y2="24"/>
    <line x1="10" y1="38" x2="38" y2="38"/>
    <!-- Vertical columns -->
    <line x1="10" y1="10" x2="10" y2="38"/>
    <line x1="24" y1="10" x2="24" y2="38"/>
    <line x1="38" y1="10" x2="38" y2="38"/>
    <!-- Diagonals -->
    <line x1="10" y1="10" x2="38" y2="38"/>
    <line x1="38" y1="10" x2="10" y2="38"/>
  </g>

  <!-- Outer nodes (8, skip center) -->
  <g fill="#818cf8" opacity="0.75">
    <circle cx="10" cy="10" r="2"/>
    <circle cx="24" cy="10" r="2"/>
    <circle cx="38" cy="10" r="2"/>
    <circle cx="10" cy="24" r="2"/>
    <circle cx="38" cy="24" r="2"/>
    <circle cx="10" cy="38" r="2"/>
    <circle cx="24" cy="38" r="2"/>
    <circle cx="38" cy="38" r="2"/>
  </g>

  <!-- Center glowing node -->
  <circle cx="24" cy="24" r="6" fill="#818cf8" opacity="0.12"/>
  <circle cx="24" cy="24" r="3.5" fill="#818cf8" opacity="0.85" filter="url(#aa-glow)"/>
  <circle cx="24" cy="24" r="1.6" fill="white" opacity="0.95"/>
</svg>
