<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="Agent Forge">
  <defs>
    <linearGradient id="af-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="50%"  stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="af-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon (framework shell) -->
  <polygon
    points="24,4 40,14 40,34 24,44 8,34 8,14"
    fill="none"
    stroke="url(#af-grad)"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Inner diamond (forge core) -->
  <polygon
    points="24,13 33,24 24,35 15,24"
    fill="none"
    stroke="url(#af-grad)"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.5"
  />

  <!-- Connection spokes from hexagon to inner diamond -->
  <g stroke="url(#af-grad)" stroke-width="1" opacity="0.3" stroke-linecap="round">
    <line x1="24" y1="4"  x2="24" y2="13"/>
    <line x1="40" y1="14" x2="33" y2="24"/>
    <line x1="40" y1="34" x2="33" y2="24"/>
    <line x1="24" y1="44" x2="24" y2="35"/>
    <line x1="8"  y1="34" x2="15" y2="24"/>
    <line x1="8"  y1="14" x2="15" y2="24"/>
  </g>

  <!-- Center forge node -->
  <circle cx="24" cy="24" r="6" fill="#f97316" opacity="0.10"/>
  <circle cx="24" cy="24" r="3.5" fill="#e879f9" opacity="0.85" filter="url(#af-glow)"/>
  <circle cx="24" cy="24" r="1.6" fill="white" opacity="0.95"/>
</svg>
