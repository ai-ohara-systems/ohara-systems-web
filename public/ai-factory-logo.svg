  <line x1="118" y1="130" x2="139" y2="130" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="91" x2="100" y2="112" stroke="#f97316" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="148" x2="100" y2="169" stroke="#e879f9" stroke-width="1.5" opacity="0.4"/>
